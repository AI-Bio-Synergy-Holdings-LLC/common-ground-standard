<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Common Ground Standard evidence loop</title>
  <desc id="desc">A clean schematic showing public benefit evidence at the center of infrastructure safeguards, campus governance, benefit sharing, assurance, and implementation.</desc>
  <defs>
    <filter id="panelShadow" x="-12%" y="-18%" width="124%" height="136%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#071522" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 10 5 0 10z" fill="#0b7184"/>
    </marker>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" fill="none" stroke="#dbe8eb" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="760" fill="#ffffff"/>
  <rect x="36" y="36" width="1128" height="688" rx="10" fill="#f8fbfb" stroke="#d8e5e8"/>
  <rect x="72" y="82" width="1056" height="584" fill="url(#grid)" opacity="0.62"/>

  <g font-family="Inter, Arial, sans-serif">
    <text x="92" y="94" font-size="18" font-weight="800" fill="#005e70">PUBLIC REVIEW ONLY</text>
    <text x="92" y="122" font-size="15" font-weight="650" fill="#52616d">claims stay bounded until evidence is reviewable</text>
  </g>

  <g fill="none" stroke="#0b7184" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)" opacity="0.88">
    <path d="M365 191C447 126 557 103 660 129"/>
    <path d="M820 204c88 82 120 203 85 318"/>
    <path d="M771 593c-99 71-234 85-346 38"/>
    <path d="M281 542c-71-96-81-222-30-331"/>
  </g>

  <g filter="url(#panelShadow)" font-family="Inter, Arial, sans-serif">
    <rect x="430" y="278" width="340" height="170" rx="10" fill="#ffffff" stroke="#005e70" stroke-width="3"/>
    <circle cx="600" cy="318" r="16" fill="#e8f5f7" stroke="#0b7184" stroke-width="3"/>
    <path d="M592 318h16M600 310v16" stroke="#0b7184" stroke-width="3" stroke-linecap="round"/>
    <text x="600" y="366" text-anchor="middle" font-size="26" font-weight="850" fill="#071522">Public Benefit</text>
    <text x="600" y="400" text-anchor="middle" font-size="26" font-weight="850" fill="#071522">Evidence</text>
    <path d="M506 421h188" stroke="#d7e3e6" stroke-width="3"/>
  </g>

  <g filter="url(#panelShadow)" font-family="Inter, Arial, sans-serif">
    <g>
      <rect x="130" y="156" width="300" height="112" rx="10" fill="#ffffff" stroke="#0b7184" stroke-width="3"/>
      <text x="164" y="204" font-size="24" font-weight="850" fill="#071522">Infrastructure</text>
      <text x="164" y="236" font-size="16" font-weight="650" fill="#52616d">energy, water, compute, siting</text>
    </g>

    <g>
      <rect x="770" y="154" width="300" height="112" rx="10" fill="#ffffff" stroke="#0b7184" stroke-width="3"/>
      <text x="804" y="202" font-size="24" font-weight="850" fill="#071522">Campus Governance</text>
      <text x="804" y="234" font-size="16" font-weight="650" fill="#52616d">students, workers, institutions</text>
    </g>

    <g>
      <rect x="820" y="472" width="300" height="112" rx="10" fill="#ffffff" stroke="#0b7184" stroke-width="3"/>
      <text x="854" y="520" font-size="24" font-weight="850" fill="#071522">Benefit Sharing</text>
      <text x="854" y="552" font-size="16" font-weight="650" fill="#52616d">verified value routed visibly</text>
    </g>

    <g>
      <rect x="450" y="584" width="300" height="112" rx="10" fill="#ffffff" stroke="#0b7184" stroke-width="3"/>
      <text x="484" y="632" font-size="24" font-weight="850" fill="#071522">Assurance</text>
      <text x="484" y="664" font-size="16" font-weight="650" fill="#52616d">audit, receipts, no-go terms</text>
    </g>

    <g>
      <rect x="92" y="452" width="300" height="112" rx="10" fill="#ffffff" stroke="#0b7184" stroke-width="3"/>
      <text x="126" y="500" font-size="24" font-weight="850" fill="#071522">Implementation</text>
      <text x="126" y="532" font-size="16" font-weight="650" fill="#52616d">pilot gates before scaling</text>
    </g>
  </g>

  <g fill="none" stroke="#6d98a0" stroke-width="3" stroke-dasharray="8 10" opacity="0.78">
    <path d="M430 230 506 300"/>
    <path d="M770 232 694 302"/>
    <path d="M858 500 735 421"/>
    <path d="M565 584 600 448"/>
    <path d="M392 504 466 421"/>
  </g>

  <g font-family="Inter, Arial, sans-serif">
    <rect x="88" y="642" width="238" height="42" rx="21" fill="#fff8eb" stroke="#d98a00" stroke-width="2"/>
    <text x="207" y="669" text-anchor="middle" font-size="15" font-weight="850" fill="#865600">NO ENDORSEMENT CLAIM</text>
  </g>
</svg>
