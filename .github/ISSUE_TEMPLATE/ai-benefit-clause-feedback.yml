name: AI Benefit Clause feedback
description: Review benefit-sharing, AI dividend, value-routing, and public receipt terms.
title: "[AI Benefit Clause]: "
labels: ["ai-benefit-clause", "public-review"]
body:
  - type: textarea
    id: benefit-concern
    attributes:
      label: Benefit-sharing concern
      description: What is missing, vague, weak, or vulnerable to misuse in the AI Dividend / Benefit Clause?
    validations:
      required: true
  - type: textarea
    id: measurement
    attributes:
      label: Measurement or baseline issue
      description: How should AI-created value, avoided harm, savings, productivity gains, or surplus be measured?
    validations:
      required: false
  - type: textarea
    id: governance
    attributes:
      label: Governance issue
      description: Who should decide where benefits go, and what appeal or oversight rights should exist?
    validations:
      required: false
  - type: textarea
    id: proposed-change
    attributes:
      label: Proposed change
      description: Suggest clause language, a no-go condition, or a public receipt requirement.
    validations:
      required: false
  - type: checkboxes
    id: boundaries
    attributes:
      label: Public-review boundaries
      options:
        - label: This issue does not include confidential, restricted, personal, or private data.
          required: true
        - label: This issue does not imply endorsement, partnership, certification, or official status.
          required: true
