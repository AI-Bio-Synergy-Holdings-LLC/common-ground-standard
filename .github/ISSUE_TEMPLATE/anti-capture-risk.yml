name: Anti-capture risk
description: Flag a way the draft could be diluted, captured, or used as reputation cover.
title: "[Anti-capture risk]: "
labels: ["anti-capture", "public-review"]
body:
  - type: markdown
    attributes:
      value: |
        Use this form to identify reputation-cover, capture, self-certification, weak evidence, or public-benefit overclaiming risks.
  - type: textarea
    id: risk
    attributes:
      label: Risk
      description: What could be captured, diluted, overstated, or misused?
    validations:
      required: true
  - type: dropdown
    id: actor
    attributes:
      label: Actor or pathway most relevant to the risk
      options:
        - AI company or platform
        - Infrastructure or data-center actor
        - University or campus vendor
        - Foundation or funder
        - Public agency
        - Certification or conformance process
        - Other
    validations:
      required: true
  - type: textarea
    id: consequence
    attributes:
      label: Possible consequence
      description: What could go wrong if this risk is not addressed?
    validations:
      required: true
  - type: textarea
    id: safeguard
    attributes:
      label: Proposed safeguard
      description: What clause, no-go condition, evidence requirement, or governance rule would reduce this risk?
    validations:
      required: false
  - type: checkboxes
    id: boundaries
    attributes:
      label: Public-review boundaries
      options:
        - label: This issue does not include confidential, restricted, personal, or private data.
          required: true
        - label: This issue does not imply endorsement, partnership, certification, or official status.
          required: true
