name: Campus Compact feedback
description: Review student, worker, faculty, or campus-governance safeguards.
title: "[Campus Compact]: "
labels: ["campus-compact", "student-rights", "public-review"]
body:
  - type: textarea
    id: issue
    attributes:
      label: Campus AI governance issue
      description: What student, worker, faculty, data, authorship, surveillance, procurement, or appeal-rights concern should be addressed?
    validations:
      required: true
  - type: textarea
    id: affected-party
    attributes:
      label: Affected parties
      description: Who is affected by this issue?
      placeholder: "Students, faculty, campus workers, advisors, applicants, community partners..."
    validations:
      required: false
  - type: textarea
    id: proposed-rule
    attributes:
      label: Proposed compact rule or safeguard
      description: What should the Campus Common Ground Compact require, prohibit, disclose, or govern?
    validations:
      required: false
  - type: textarea
    id: evidence
    attributes:
      label: Evidence or example
      description: Share a public example, policy precedent, or practical concern. Do not include private student or worker records.
    validations:
      required: false
  - type: checkboxes
    id: boundaries
    attributes:
      label: Public-review boundaries
      options:
        - label: This issue does not include confidential, restricted, personal, student, worker, or private data.
          required: true
        - label: This issue does not imply endorsement, partnership, certification, or official status.
          required: true
