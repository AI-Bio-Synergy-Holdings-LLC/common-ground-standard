name: Evidence requirement
description: Propose evidence thresholds, public receipts, auditability, or no-go triggers.
title: "[Evidence requirement]: "
labels: ["evidence", "public-review"]
body:
  - type: textarea
    id: claim
    attributes:
      label: Claim or decision that needs evidence
      description: What public-benefit, alignment, implementation, or scaling claim should require proof?
    validations:
      required: true
  - type: textarea
    id: evidence-required
    attributes:
      label: Minimum evidence required
      description: What should be measured, disclosed, audited, or published before the claim is made?
    validations:
      required: true
  - type: textarea
    id: no-go
    attributes:
      label: No-go or pause condition
      description: What condition should pause, redesign, or reject a deployment, pilot, infrastructure project, or claim?
    validations:
      required: false
  - type: textarea
    id: audit
    attributes:
      label: Audit or review pathway
      description: Who can credibly review the evidence, and what should remain public, controlled, confidential, or restricted?
    validations:
      required: false
  - type: checkboxes
    id: boundaries
    attributes:
      label: Public-review boundaries
      options:
        - label: This issue does not include confidential, restricted, personal, or private data.
          required: true
        - label: This issue does not imply endorsement, partnership, certification, or official status.
          required: true
