name: Standard feedback
description: Suggest a change or critique for the Common Ground Standard draft.
title: "[Standard feedback]: "
labels: ["standard", "public-review"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reviewing the Common Ground Standard. Do not include confidential information, private data, trade secrets, or endorsement claims.
  - type: textarea
    id: section
    attributes:
      label: Draft section or clause
      description: Which part of the standard are you commenting on?
      placeholder: "Example: Minimum Requirements / Community benefit"
    validations:
      required: true
  - type: textarea
    id: concern
    attributes:
      label: Concern or proposed improvement
      description: What is vague, missing, too weak, too broad, or impractical?
    validations:
      required: true
  - type: textarea
    id: suggested-change
    attributes:
      label: Suggested change
      description: Provide proposed wording, a concrete requirement, or a decision rule if possible.
    validations:
      required: false
  - type: textarea
    id: evidence
    attributes:
      label: Evidence or reasoning
      description: What practical experience, policy precedent, technical concern, or public-interest rationale supports this feedback?
    validations:
      required: false
  - type: checkboxes
    id: boundaries
    attributes:
      label: Public-review boundaries
      options:
        - label: This issue does not include confidential, restricted, personal, or private data.
          required: true
        - label: This issue does not imply endorsement, partnership, certification, or official status.
          required: true
